<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Super Simple Media Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

<link rel="icon"
href="https://raw.githubusercontent.com/NOF7351/KST-Tools/refs/heads/main/Resourses/supersimplemediaplayer-logo.png"
type="image/x-icon">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    width:100vw;
    height:100vh;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#050505;

    color:white;
}

/* =========================
    BACKGROUND
========================= */

.dynamic-bg{
    position:fixed;
    inset:-20%;

    z-index:-3;

    background:
    radial-gradient(circle at center,
    rgba(255,0,150,.4),
    rgba(0,0,0,.98));

    filter:blur(100px);

    transform:scale(1.15);

    transition:
    transform .08s linear,
    filter .08s linear,
    background .08s linear;
}

.overlay{
    position:fixed;
    inset:0;

    z-index:-2;

    background:
    linear-gradient(
    -45deg,
    rgba(255,0,140,.18),
    rgba(0,140,255,.18),
    rgba(0,255,180,.18),
    rgba(140,0,255,.18));

    background-size:400% 400%;

    animation:bgFlow 16s ease infinite;
}

@keyframes bgFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* =========================
    PLAYER
========================= */

.glass-container{

    position:relative;

    width:92%;
    max-width:1000px;

    min-height:520px;

    max-height:92vh;

    overflow:hidden;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;

    padding:42px;

    border-radius:32px;

    background:rgba(255,255,255,.07);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    box-shadow:
    0 30px 70px rgba(0,0,0,.45);

    transition:
    all 1.3s cubic-bezier(.42,0,.58,1);
}

/* FULLSCREEN */

.glass-container.ambient{

    position:fixed;
    inset:0;

    width:100vw;
    height:100vh;

    max-width:none;
    max-height:none;

    border:none;
    border-radius:0;

    background:rgba(0,0,0,.22);

    backdrop-filter:blur(60px);
    -webkit-backdrop-filter:blur(60px);

    padding:60px;

    box-shadow:none;

    justify-content:center;
}

/* =========================
    TITLE
========================= */

h1{
    margin-bottom:8px;
    font-size:2rem;
    font-weight:600;
}

.subtitle{
    opacity:.75;
    margin-bottom:28px;
}

/* =========================
    DROP ZONE
========================= */

.drop-zone{

    width:100%;

    border:2px dashed rgba(255,255,255,.25);

    border-radius:24px;

    padding:80px 20px;

    cursor:pointer;

    transition:.3s;
}

.drop-zone:hover{
    background:rgba(255,255,255,.06);
    border-color:white;
}

.drop-zone span{
    font-size:1.15rem;
}

input[type=file]{
    display:none;
}

/* =========================
    CONTENT
========================= */

#media-content{

    width:100%;

    display:none;
    flex-direction:column;
    align-items:center;

    animation:fade .5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

/* =========================
    AUDIO LAYOUT
========================= */

.audio-layout{

    width:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* =========================
    COVER
========================= */

.album-wrapper{

    width:0;

    opacity:0;

    overflow:hidden;

    transition:
    width 1s ease-in-out,
    opacity 1s ease-in-out,
    margin-bottom 1s ease-in-out;
}

.glass-container.ambient .album-wrapper{

    width:320px;

    opacity:1;

    margin-bottom:30px;
}

.album-cover{

    width:320px;
    height:320px;

    object-fit:cover;

    border-radius:28px;

    box-shadow:
    0 30px 80px rgba(0,0,0,.55),
    0 0 80px rgba(255,255,255,.08);
}

/* =========================
    VISUALIZER
========================= */

canvas{

    width:100%;
    height:220px;

    margin-bottom:25px;

    border-radius:20px;
}

/* =========================
    AUDIO
========================= */

audio{
    width:100%;
}

/* =========================
    FILE INFO
========================= */

.file-info{

    margin-top:18px;

    padding:7px 18px;

    border-radius:999px;

    background:rgba(0,0,0,.25);

    font-size:.9rem;

    opacity:.9;
}

/* =========================
    CLOSE
========================= */

.close-btn{

    position:absolute;

    top:20px;
    right:20px;

    width:42px;
    height:42px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:1.3rem;

    cursor:pointer;

    display:none;

    transition:.25s;

    z-index:20;
}

.close-btn:hover{
    transform:scale(1.12);
    background:rgba(255,255,255,.15);
}

/* =========================
    IMAGE / VIDEO
========================= */

img,
video{

    max-width:100%;

    max-height:65vh;

    border-radius:24px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

@media(max-width:768px){

    .glass-container{
        padding:28px;
        min-height:unset;
    }

    .glass-container.ambient{
        padding:30px;
    }

    .glass-container.ambient .album-wrapper{
        width:220px;
    }

    .album-cover{
        width:220px;
        height:220px;
    }

}

</style>
</head>

<body>

<div class="dynamic-bg" id="dynamic-bg"></div>

<div class="overlay"></div>

<div class="glass-container" id="glass-container">

<button id="close-btn" class="close-btn">✕</button>

<h1 id="main-title">
Супер простой медиаплеер
</h1>

<p class="subtitle">
Перетащите файл сюда
</p>

<div id="drop-zone" class="drop-zone">

<span>
📂 Загрузить файл
</span>

<input
id="file-input"
type="file"
accept="image/*,video/*,audio/*"
/>

</div>

<div id="media-content"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<script>

const dropZone =
document.getElementById('drop-zone')

const fileInput =
document.getElementById('file-input')

const mediaContent =
document.getElementById('media-content')

const closeBtn =
document.getElementById('close-btn')

const title =
document.getElementById('main-title')

const glassContainer =
document.getElementById('glass-container')

const dynamicBg =
document.getElementById('dynamic-bg')

let audioContext
let analyser
let source
let animationId
let ambientTimeout = null

/* =========================
    EVENTS
========================= */

dropZone.addEventListener('click',()=>{
    fileInput.click()
})

dropZone.addEventListener('dragover',(e)=>{

    e.preventDefault()

    dropZone.style.background =
    'rgba(255,255,255,.08)'
})

dropZone.addEventListener('dragleave',()=>{

    dropZone.style.background =
    'transparent'
})

dropZone.addEventListener('drop',(e)=>{

    e.preventDefault()

    dropZone.style.background =
    'transparent'

    if(e.dataTransfer.files.length){

        handleFile(
        e.dataTransfer.files[0]
        )
    }
})

fileInput.addEventListener('change',(e)=>{

    if(e.target.files.length){

        handleFile(
        e.target.files[0]
        )
    }
})

closeBtn.addEventListener('click',resetPlayer)

/* =========================
    AMBIENT TIMER
========================= */

function resetAmbientTimer(){

    glassContainer.classList.remove('ambient')

    clearTimeout(ambientTimeout)

    ambientTimeout = setTimeout(()=>{

        glassContainer.classList.add('ambient')

    },5000)
}

;[
'mousemove',
'click',
'keydown',
'touchstart'
].forEach(event=>{

    window.addEventListener(
    event,
    resetAmbientTimer
    )
})

/* =========================
    GET REAL COVER
========================= */

function getAudioCover(file){

    return new Promise((resolve)=>{

        jsmediatags.read(file,{

            onSuccess:function(tag){

                const picture =
                tag.tags.picture

                if(picture){

                    let base64String = ""

                    for(
                        let i = 0;
                        i < picture.data.length;
                        i++
                    ){
                        base64String +=
                        String.fromCharCode(
                        picture.data[i]
                        )
                    }

                    const imageUrl =
                    `data:${picture.format};base64,${
                    window.btoa(base64String)
                    }`

                    resolve(imageUrl)

                }else{

                    resolve(null)
                }
            },

            onError:function(){

                resolve(null)
            }
        })
    })
}

/* =========================
    HANDLE FILE
========================= */

async function handleFile(file){

    resetPlayer()

    const fileURL =
    URL.createObjectURL(file)

    const type = file.type

    dropZone.style.display = 'none'

    mediaContent.style.display = 'flex'

    closeBtn.style.display = 'block'

    document.querySelector('.subtitle')
    .style.display = 'none'

    title.textContent =
    'Сейчас воспроизводится'

    let element

    /* IMAGE */

    if(type.startsWith('image/')){

        element =
        document.createElement('img')

        element.src = fileURL

        mediaContent.appendChild(element)
    }

    /* VIDEO */

    else if(type.startsWith('video/')){

        element =
        document.createElement('video')

        element.src = fileURL

        element.controls = true

        element.autoplay = true

        mediaContent.appendChild(element)
    }

    /* AUDIO */

    else if(type.startsWith('audio/')){

        const wrapper =
        document.createElement('div')

        wrapper.className =
        'audio-layout'

        /* REAL COVER */

        const cover =
        await getAudioCover(file)

        const albumWrapper =
        document.createElement('div')

        albumWrapper.className =
        'album-wrapper'

        const albumCover =
        document.createElement('img')

        albumCover.className =
        'album-cover'

        albumCover.src =
        cover ||
        'https://raw.githubusercontent.com/NOF7351/KST-Tools/main/Resourses/supersimplemediaplayer-logo.png'

        albumWrapper.appendChild(albumCover)

        /* CANVAS */

        const canvas =
        document.createElement('canvas')

        /* AUDIO */

        element =
        document.createElement('audio')

        element.src = fileURL

        element.controls = true

        element.autoplay = true

        element.crossOrigin =
        'anonymous'

        wrapper.appendChild(albumWrapper)

        wrapper.appendChild(canvas)

        wrapper.appendChild(element)

        mediaContent.appendChild(wrapper)

        element.onplay = ()=>{

            if(!audioContext){

                initAudioContext(
                element,
                canvas
                )
            }

            if(audioContext.state ===
            'suspended'){

                audioContext.resume()
            }

            resetAmbientTimer()
        }
    }

    /* FILE INFO */

    const info =
    document.createElement('div')

    info.className = 'file-info'

    info.textContent = file.name

    mediaContent.appendChild(info)
}

/* =========================
    AUDIO API
========================= */

function initAudioContext(
audioElement,
canvas
){

    audioContext =
    new (
    window.AudioContext
    || window.webkitAudioContext
    )()

    analyser =
    audioContext.createAnalyser()

    source =
    audioContext.createMediaElementSource(
    audioElement
    )

    source.connect(analyser)

    analyser.connect(
    audioContext.destination
    )

    analyser.fftSize = 512

    const bufferLength =
    analyser.frequencyBinCount

    const dataArray =
    new Uint8Array(bufferLength)

    const ctx =
    canvas.getContext('2d')

    function renderFrame(){

        animationId =
        requestAnimationFrame(
        renderFrame
        )

        canvas.width =
        canvas.offsetWidth

        canvas.height =
        canvas.offsetHeight

        const width =
        canvas.width

        const height =
        canvas.height

        analyser.getByteFrequencyData(
        dataArray
        )

        ctx.clearRect(
        0,
        0,
        width,
        height
        )

        /* =========================
            BACKGROUND
        ========================= */

        const bass =
        dataArray
        .slice(0,18)
        .reduce((a,b)=>a+b,0) / 18

        const pulse =
        bass / 255

        const scale =
        1 + pulse * .45

        const blur =
        100 + pulse * 180

        const saturation =
        1.5 + pulse * 3

        const glow =
        120 + bass

        dynamicBg.style.transform =
        `scale(${scale})`

        dynamicBg.style.filter =
        `blur(${blur}px)
        saturate(${saturation})`

        dynamicBg.style.background = `
        radial-gradient(circle at center,

        rgba(
        ${180 + glow},
        ${40 + bass},
        255,
        ${0.35 + pulse * .6}
        ),

        rgba(
        120,
        0,
        255,
        ${0.2 + pulse * .5}
        ),

        rgba(
        0,
        0,
        0,
        .99
        )
        )`

        /* =========================
            VISUALIZER
        ========================= */

        const bars = 90

        const step =
        Math.floor(bufferLength / bars)

        const barWidth =
        width / bars - 4

        let x = 0

        for(let i=0;i<bars;i++){

            const value =
            dataArray[i * step]

            const barHeight =
            value / 255 * height

            const gradient =
            ctx.createLinearGradient(
            0,
            height,
            0,
            height - barHeight
            )

            gradient.addColorStop(
            0,
            'rgba(255,255,255,.95)'
            )

            gradient.addColorStop(
            1,
            'rgba(255,255,255,.08)'
            )

            ctx.fillStyle = gradient

            roundRect(
            ctx,
            x,
            height - barHeight,
            barWidth,
            barHeight,
            6
            )

            x += barWidth + 4
        }
    }

    renderFrame()
}

/* =========================
    ROUND RECT
========================= */

function roundRect(
ctx,
x,
y,
width,
height,
radius
){

    if(height < radius){
        radius = height
    }

    ctx.beginPath()

    ctx.moveTo(
    x + radius,
    y
    )

    ctx.lineTo(
    x + width - radius,
    y
    )

    ctx.quadraticCurveTo(
    x + width,
    y,
    x + width,
    y + radius
    )

    ctx.lineTo(
    x + width,
    y + height
    )

    ctx.lineTo(
    x,
    y + height
    )

    ctx.lineTo(
    x,
    y + radius
    )

    ctx.quadraticCurveTo(
    x,
    y,
    x + radius,
    y
    )

    ctx.closePath()

    ctx.fill()
}

/* =========================
    RESET
========================= */

function resetPlayer(){

    clearTimeout(
    ambientTimeout
    )

    glassContainer
    .classList
    .remove('ambient')

    if(animationId){

        cancelAnimationFrame(
        animationId
        )
    }

    if(audioContext){

        audioContext.close()
    }

    audioContext = null

    mediaContent.innerHTML = ''

    mediaContent.style.display =
    'none'

    dropZone.style.display =
    'block'

    closeBtn.style.display =
    'none'

    fileInput.value = ''

    title.textContent =
    'Супер простой медиаплеер'

    document.querySelector('.subtitle')
    .style.display = 'block'

    dynamicBg.style.background =
    `
    radial-gradient(circle at center,
    rgba(255,0,150,.4),
    rgba(0,0,0,.98))
    `
}

</script>
