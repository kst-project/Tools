<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ambient Media Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<link rel="icon"
href="https://raw.githubusercontent.com/NOF7351/KST-Tools/refs/heads/main/Resourses/supersimplemediaplayer-logo.png"
type="image/x-icon">

<script>
window.yaContextCb = window.yaContextCb || []
</script>

<script src="https://yandex.ru/ads/system/context.js" async></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#050505;

    font-family:'Poppins',sans-serif;

    color:white;
}

/* =========================
    BACKGROUND
========================= */

.dynamic-bg{
    position:fixed;
    inset:-25%;

    z-index:-3;

    background:
    radial-gradient(circle at center,
    rgba(255,0,140,.5),
    rgba(0,0,0,.98));

    filter:blur(120px);

    transform:scale(1.15);

    transition:
    transform .06s linear,
    filter .06s linear,
    background .06s linear;
}

.overlay{
    position:fixed;
    inset:0;

    z-index:-2;

    background:
    linear-gradient(
    -45deg,
    rgba(255,0,140,.08),
    rgba(0,140,255,.08),
    rgba(0,255,180,.08),
    rgba(140,0,255,.08));

    background-size:400% 400%;

    animation:bgFlow 14s ease infinite;
}

@keyframes bgFlow{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* =========================
    PLAYER
========================= */

.glass-container{

    position:relative;

    width:92%;
    max-width:1050px;

    min-height:520px;

    max-height:92vh;

    overflow:hidden;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;

    padding:42px;

    border-radius:34px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    box-shadow:
    0 30px 70px rgba(0,0,0,.45);

    transition:
    all 1.3s cubic-bezier(.42,0,.58,1);
}

.glass-container.ambient{

    position:fixed;
    inset:0;

    width:100vw;
    height:100vh;

    max-width:none;
    max-height:none;

    border:none;
    border-radius:0;

    padding:60px;

    background:rgba(0,0,0,.18);

    backdrop-filter:blur(65px);
    -webkit-backdrop-filter:blur(65px);

    justify-content:center;

    box-shadow:none;
}

/* =========================
    HEADERS
========================= */

h1{
    font-size:2rem;
    font-weight:600;

    margin-bottom:8px;
}

.subtitle{
    opacity:.7;

    margin-bottom:28px;
}

/* =========================
    DROPZONE
========================= */

.drop-zone{

    width:100%;

    border:2px dashed rgba(255,255,255,.22);

    border-radius:24px;

    padding:80px 20px;

    cursor:pointer;

    transition:.3s;
}

.drop-zone:hover{
    background:rgba(255,255,255,.05);
    border-color:white;
}

input[type=file]{
    display:none;
}

/* =========================
    CONTENT
========================= */

#media-content{

    width:100%;

    display:none;
    flex-direction:column;
    align-items:center;

    animation:fade .5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:none;
    }
}

/* =========================
    AUDIO AREA
========================= */

.audio-layout{

    width:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* =========================
    NOW PLAYING
========================= */

.now-playing{

    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;

    margin-bottom:30px;

    transition:
    all 1.2s cubic-bezier(.42,0,.58,1);
}

/* INITIAL */

.track-info{

    opacity:0;

    transform:
    translateX(40px);

    transition:
    all 1s ease-in-out;

    text-align:left;

    min-width:240px;
}

/* SHOW INFO */

.glass-container.track-mode .track-info{

    opacity:1;

    transform:translateX(0);
}

/* MOVE COVER */

.glass-container.track-mode .now-playing{

    transform:translateX(-80px);
}

/* =========================
    COVER
========================= */

.album-wrapper{

    width:0;

    opacity:0;

    overflow:hidden;

    transition:
    width 1s ease-in-out,
    opacity 1s ease-in-out,
    margin-bottom 1s ease-in-out;
}

.glass-container.ambient .album-wrapper{

    width:320px;

    opacity:1;
}

.album-cover{

    width:320px;
    height:320px;

    object-fit:cover;

    border-radius:28px;

    box-shadow:
    0 30px 90px rgba(0,0,0,.6),
    0 0 80px rgba(255,255,255,.08);
}

/* =========================
    TRACK TEXT
========================= */

.artist{

    font-size:1rem;

    font-weight:400;

    opacity:.65;

    margin-bottom:10px;
}

.song-title{

    font-size:2rem;

    line-height:1.1;

    font-weight:700;

    word-break:break-word;
}

/* =========================
    VISUALIZER
========================= */

canvas{

    width:100%;
    height:240px;

    border-radius:20px;

    margin-bottom:24px;
}

/* =========================
    AUDIO
========================= */

audio{
    width:100%;
}

/* =========================
    FILE INFO
========================= */

.file-info{

    margin-top:18px;

    background:rgba(0,0,0,.25);

    padding:7px 18px;

    border-radius:999px;

    font-size:.9rem;

    opacity:.9;
}

/* =========================
    CLOSE
========================= */

.close-btn{

    position:absolute;

    top:20px;
    right:20px;

    width:44px;
    height:44px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:1.2rem;

    cursor:pointer;

    display:none;

    transition:.25s;

    z-index:20;
}

.close-btn:hover{

    transform:scale(1.12);

    background:rgba(255,255,255,.16);
}

/* =========================
    IMAGE / VIDEO
========================= */

img,
video{

    max-width:100%;

    max-height:65vh;

    border-radius:28px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

@media(max-width:900px){

    .glass-container.track-mode .now-playing{
        transform:none;
    }

    .now-playing{
        flex-direction:column;
        text-align:center;
    }

    .track-info{
        text-align:center;
    }

    .song-title{
        font-size:1.5rem;
    }
}

</style>
</head>

<body>

<div class="dynamic-bg" id="dynamic-bg"></div>

<div class="overlay"></div>

<div class="glass-container" id="glass-container">

<button id="close-btn" class="close-btn">✕</button>

<h1 id="main-title">
Супер простой медиаплеер
</h1>

<p class="subtitle">
Перетащите файл сюда
</p>

<div id="drop-zone" class="drop-zone">

<span>
📂 Загрузить файл
</span>

<input
id="file-input"
type="file"
accept="image/*,video/*,audio/*"
/>

</div>

<div id="media-content"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<script>

const dropZone =
document.getElementById('drop-zone')

const fileInput =
document.getElementById('file-input')

const mediaContent =
document.getElementById('media-content')

const closeBtn =
document.getElementById('close-btn')

const title =
document.getElementById('main-title')

const glassContainer =
document.getElementById('glass-container')

const dynamicBg =
document.getElementById('dynamic-bg')

let audioContext
let analyser
let source
let animationId

let ambientTimeout = null
let trackInfoTimeout = null

/* =========================
    EVENTS
========================= */

dropZone.addEventListener('click',()=>{
    fileInput.click()
})

dropZone.addEventListener('dragover',(e)=>{

    e.preventDefault()

    dropZone.style.background =
    'rgba(255,255,255,.06)'
})

dropZone.addEventListener('dragleave',()=>{

    dropZone.style.background =
    'transparent'
})

dropZone.addEventListener('drop',(e)=>{

    e.preventDefault()

    dropZone.style.background =
    'transparent'

    if(e.dataTransfer.files.length){

        handleFile(
        e.dataTransfer.files[0]
        )
    }
})

fileInput.addEventListener('change',(e)=>{

    if(e.target.files.length){

        handleFile(
        e.target.files[0]
        )
    }
})

closeBtn.addEventListener('click',resetPlayer)

/* =========================
    AMBIENT TIMER
========================= */

function resetAmbientTimer(){

    glassContainer.classList.remove('ambient')
    glassContainer.classList.remove('track-mode')

    clearTimeout(ambientTimeout)
    clearTimeout(trackInfoTimeout)

    ambientTimeout = setTimeout(()=>{

        glassContainer.classList.add('ambient')

        trackInfoTimeout = setTimeout(()=>{

            glassContainer.classList.add('track-mode')

        },2000)

    },7000)
}

;[
'mousemove',
'click',
'keydown',
'touchstart'
].forEach(event=>{

    window.addEventListener(
    event,
    resetAmbientTimer
    )
})

/* =========================
    GET TAGS
========================= */

function getAudioMetadata(file){

    return new Promise((resolve)=>{

        jsmediatags.read(file,{

            onSuccess:function(tag){

                const tags = tag.tags

                let imageUrl = null

                if(tags.picture){

                    let base64String = ""

                    for(
                        let i = 0;
                        i < tags.picture.data.length;
                        i++
                    ){
                        base64String +=
                        String.fromCharCode(
                        tags.picture.data[i]
                        )
                    }

                    imageUrl =
                    `data:${tags.picture.format};base64,${
                    window.btoa(base64String)
                    }`
                }

                resolve({

                    cover:imageUrl,

                    artist:
                    tags.artist || '',

                    title:
                    tags.title || ''
                })
            },

            onError:function(){

                resolve({
                    cover:null,
                    artist:'',
                    title:''
                })
            }
        })
    })
}

/* =========================
    REMOVE EXTENSION
========================= */

function removeExtension(filename){

    return filename.replace(
    /\.[^/.]+$/,
    ""
    )
}

/* =========================
    HANDLE FILE
========================= */

async function handleFile(file){

    resetPlayer()

    const fileURL =
    URL.createObjectURL(file)

    const type = file.type

    dropZone.style.display = 'none'

    mediaContent.style.display = 'flex'

    closeBtn.style.display = 'block'

    document.querySelector('.subtitle')
    .style.display = 'none'

    title.textContent =
    'Сейчас воспроизводится'

    let element

    /* IMAGE */

    if(type.startsWith('image/')){

        element =
        document.createElement('img')

        element.src = fileURL

        mediaContent.appendChild(element)
    }

    /* VIDEO */

    else if(type.startsWith('video/')){

        element =
        document.createElement('video')

        element.src = fileURL

        element.controls = true

        element.autoplay = true

        mediaContent.appendChild(element)
    }

    /* AUDIO */

    else if(type.startsWith('audio/')){

        const metadata =
        await getAudioMetadata(file)

        const wrapper =
        document.createElement('div')

        wrapper.className =
        'audio-layout'

        /* NOW PLAYING */

        const nowPlaying =
        document.createElement('div')

        nowPlaying.className =
        'now-playing'

        /* COVER */

        const albumWrapper =
        document.createElement('div')

        albumWrapper.className =
        'album-wrapper'

        const albumCover =
        document.createElement('img')

        albumCover.className =
        'album-cover'

        albumCover.src =
        metadata.cover ||
        'https://raw.githubusercontent.com/NOF7351/KST-Tools/main/Resourses/supersimplemediaplayer-logo.png'

        albumWrapper.appendChild(albumCover)

        /* TRACK INFO */

        const trackInfo =
        document.createElement('div')

        trackInfo.className =
        'track-info'

        if(metadata.artist){

            const artist =
            document.createElement('div')

            artist.className =
            'artist'

            artist.textContent =
            metadata.artist

            trackInfo.appendChild(artist)
        }

        const titleText =
        document.createElement('div')

        titleText.className =
        'song-title'

        titleText.textContent =
        metadata.title ||
        removeExtension(file.name)

        trackInfo.appendChild(titleText)

        nowPlaying.appendChild(albumWrapper)
        nowPlaying.appendChild(trackInfo)

        /* CANVAS */

        const canvas =
        document.createElement('canvas')

        /* AUDIO */

        element =
        document.createElement('audio')

        element.src = fileURL

        element.controls = true

        element.autoplay = true

        element.crossOrigin =
        'anonymous'

        wrapper.appendChild(nowPlaying)
        wrapper.appendChild(canvas)
        wrapper.appendChild(element)

        mediaContent.appendChild(wrapper)

        element.onplay = ()=>{

            if(!audioContext){

                initAudioContext(
                element,
                canvas
                )
            }

            if(audioContext.state ===
            'suspended'){

                audioContext.resume()
            }

            resetAmbientTimer()
        }
    }

    const info =
    document.createElement('div')

    info.className = 'file-info'

    info.textContent = file.name

    mediaContent.appendChild(info)
}

/* =========================
    AUDIO API
========================= */

function initAudioContext(
audioElement,
canvas
){

    audioContext =
    new (
    window.AudioContext
    || window.webkitAudioContext
    )()

    analyser =
    audioContext.createAnalyser()

    source =
    audioContext.createMediaElementSource(
    audioElement
    )

    source.connect(analyser)

    analyser.connect(
    audioContext.destination
    )

    analyser.fftSize = 512

    const bufferLength =
    analyser.frequencyBinCount

    const dataArray =
    new Uint8Array(bufferLength)

    const ctx =
    canvas.getContext('2d')

    function renderFrame(){

        animationId =
        requestAnimationFrame(
        renderFrame
        )

        canvas.width =
        canvas.offsetWidth

        canvas.height =
        canvas.offsetHeight

        const width =
        canvas.width

        const height =
        canvas.height

        analyser.getByteFrequencyData(
        dataArray
        )

        ctx.clearRect(
        0,
        0,
        width,
        height
        )

        /* =========================
            AUDIO REACTION
        ========================= */

        const bass =
        dataArray
        .slice(0,20)
        .reduce((a,b)=>a+b,0) / 20

        const mids =
        dataArray
        .slice(40,120)
        .reduce((a,b)=>a+b,0) / 80

        const highs =
        dataArray
        .slice(120,200)
        .reduce((a,b)=>a+b,0) / 80

        const pulse =
        bass / 255

        const hue =
        (performance.now() / 35 + bass * 1.8)
        % 360

        const hue2 =
        (hue + 120) % 360

        const hue3 =
        (hue + 240) % 360

        const scale =
        1 + pulse * .5

        const blur =
        120 + pulse * 220

        dynamicBg.style.transform =
        `scale(${scale})`

        dynamicBg.style.filter =
        `
        blur(${blur}px)
        saturate(${1.8 + pulse * 3})
        brightness(${1 + pulse * .8})
        `

        dynamicBg.style.background = `
        radial-gradient(circle at center,

        hsla(
        ${hue},
        100%,
        ${55 + pulse * 25}%,
        ${0.35 + pulse * .5}
        ),

        hsla(
        ${hue2},
        100%,
        ${45 + mids / 8}%,
        ${0.25 + pulse * .3}
        ),

        hsla(
        ${hue3},
        100%,
        ${50 + highs / 10}%,
        .15
        ),

        rgba(0,0,0,.98)
        )
        `

        /* =========================
            VISUALIZER
        ========================= */

        const bars = 90

        const step =
        Math.floor(bufferLength / bars)

        const barWidth =
        width / bars - 4

        let x = 0

        for(let i=0;i<bars;i++){

            const value =
            dataArray[i * step]

            const barHeight =
            value / 255 * height

            const gradient =
            ctx.createLinearGradient(
            0,
            height,
            0,
            height - barHeight
            )

            gradient.addColorStop(
            0,
            `hsla(${hue},100%,75%,.95)`
            )

            gradient.addColorStop(
            1,
            `hsla(${hue2},100%,60%,.08)`
            )

            ctx.fillStyle = gradient

            roundRect(
            ctx,
            x,
            height - barHeight,
            barWidth,
            barHeight,
            6
            )

            x += barWidth + 4
        }
    }

    renderFrame()
}

/* =========================
    ROUND RECT
========================= */

function roundRect(
ctx,
x,
y,
width,
height,
radius
){

    if(height < radius){
        radius = height
    }

    ctx.beginPath()

    ctx.moveTo(
    x + radius,
    y
    )

    ctx.lineTo(
    x + width - radius,
    y
    )

    ctx.quadraticCurveTo(
    x + width,
    y,
    x + width,
    y + radius
    )

    ctx.lineTo(
    x + width,
    y + height
    )

    ctx.lineTo(
    x,
    y + height
    )

    ctx.lineTo(
    x,
    y + radius
    )

    ctx.quadraticCurveTo(
    x,
    y,
    x + radius,
    y
    )

    ctx.closePath()

    ctx.fill()
}

/* =========================
    RESET
========================= */

function resetPlayer(){

    clearTimeout(ambientTimeout)
    clearTimeout(trackInfoTimeout)

    glassContainer
    .classList
    .remove('ambient')

    glassContainer
    .classList
    .remove('track-mode')

    if(animationId){

        cancelAnimationFrame(
        animationId
        )
    }

    if(audioContext){

        audioContext.close()
    }

    audioContext = null

    mediaContent.innerHTML = ''

    mediaContent.style.display =
    'none'

    dropZone.style.display =
    'block'

    closeBtn.style.display =
    'none'

    fileInput.value = ''

    title.textContent =
    'Супер простой медиаплеер'

    document.querySelector('.subtitle')
    .style.display = 'block'

    dynamicBg.style.background =
    `
    radial-gradient(circle at center,
    rgba(255,0,150,.5),
    rgba(0,0,0,.98))
    `
}

</script>

<script>

window.yaContextCb.push(()=>{

    Ya.Context.AdvManager.render({

        "blockId":"R-A-18381755-1",

    })
})

</script>

</body>
</html>
