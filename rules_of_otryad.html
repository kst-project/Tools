<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка безопасности</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f0f2f5;
    font-family:Arial,sans-serif;
}

.captcha{
    background:white;
    border:1px solid #d3d3d3;
    border-radius:4px;
    padding:20px;
    display:flex;
    align-items:center;
    gap:15px;
    cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.checkbox{
    width:28px;
    height:28px;
    border:2px solid #aaa;
    border-radius:3px;
    position:relative;
}

.checkbox.checked::after{
    content:"✓";
    position:absolute;
    left:4px;
    top:-2px;
    font-size:24px;
    color:#0095ff;
}

.video-container{
    display:none;
    width:100vw;
    height:100vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="captcha" id="captcha">
    <div class="checkbox" id="checkbox"></div>
    <span>Я не робот</span>
</div>

<div class="video-container" id="player">
    <video id="video" playsinline>
        <source src="https://github.com/kst-project/Tools/raw/refs/heads/main/Resourses/not_rickroll.mp4" type="video/mp4">
    </video>
</div>

<script>
document.getElementById("captcha").addEventListener("click", async () => {

    document.getElementById("checkbox").classList.add("checked");

    setTimeout(async () => {

        document.getElementById("captcha").style.display = "none";
        document.getElementById("player").style.display = "block";

        const video = document.getElementById("video");
        video.volume = 1;

        try {
            await video.play();
        } catch (e) {
            console.error(e);
        }

    }, 500);
});
</script>

</body>
</html>
